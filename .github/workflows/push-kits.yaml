name: Publish Kit

on:
  workflow_dispatch:
    inputs:
      sbx_release:
        description: "docker/sbx-releases tag to install"
        required: true
        default: "v0.32.0"
      tag:
        description: "OCI tag to publish"
        required: false
        default: "latest"
  # Auto-publish :latest when the kit changes on main, and :<tag> on a v* tag.
  push:
    branches: [main]
    paths:
      - spec.yaml
      - README.md
      - LICENSE
      - scripts/push-kits.sh
      - .github/workflows/push-kits.yaml
    tags:
      - "v*"

jobs:
  publish-kit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SBX
        env:
          GH_TOKEN: ${{ github.token }}
          SBX_RELEASE: ${{ inputs.sbx_release || 'v0.32.0' }}
        run: |
          set -euo pipefail
          gh release download "$SBX_RELEASE" \
            --repo docker/sbx-releases \
            --pattern 'DockerSandboxes-linux-amd64-ubuntu2404.deb' \
            --output /tmp/docker-sandboxes.deb
          sudo apt-get update
          sudo apt-get install -y /tmp/docker-sandboxes.deb
          sbx version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish kit artifact
        env:
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          # Tag push -> the version tag (vX.Y.Z); dispatch -> chosen tag; main push -> latest.
          TAG: ${{ (startsWith(github.ref, 'refs/tags/') && github.ref_name) || inputs.tag || 'latest' }}
        run: bash ./scripts/push-kits.sh

      - name: Sync Docker Hub overview page
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sbx-nanoclaw-kits
          readme-filepath: ./DOCKERHUB.md
          short-description: "Docker Sandboxes agent kit for NanoClaw — Claude-Code-driven AI assistant runtime (CLI channel; WhatsApp/Telegram/… via skills)"
