schemaVersion: "1"
kind: agent
name: nanoclaw
displayName: NanoClaw
description: "Lightweight AI assistant runtime driven by Claude Code; ships the CLI channel — chat platforms (WhatsApp, Telegram, Discord, …) add via upstream skills"

agent:
  image: "docker/sandbox-templates:claude-code-docker"
  aiFilename: CLAUDE.md
  entrypoint:
    run: ["/usr/local/bin/nanoclaw-start"]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
    claude.ai: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - "downloads.claude.ai:443"
    - "claude.com:443"
    - "*.whatsapp.com"
    - "*.whatsapp.net"
    - registry.npmjs.org
    - "*.npmjs.org"
    - nanoclaw.dev
    - "github.com:443"
    - "objects.githubusercontent.com:443"

credentials:
  sources:
    anthropic:
      env:
        - ANTHROPIC_API_KEY

environment:
  variables:
    IS_SANDBOX: "1"

commands:
  # ~/.claude.json carries only the bypass flags and is credential-independent,
  # so it is a static init file (native onlyIfMissing idempotency). Phase 4
  # lifts the former `settings: { containerSettings: { claude: true } }` block
  # into the kit; the SBX_CRED_<SERVICE>_MODE-driven settings.json is seeded in
  # commands.install below (first entry, runs synchronously before the agent
  # launches). Content SYNCed with the claude kit.
  initFiles:
    - path: /home/agent/.claude.json
      content: |
        {
          "bypassPermissionsModeAccepted": true,
          "hasCompletedOnboarding": true,
          "projects": {
              "/": {
              "hasTrustDialogAccepted": true
            }
          }
        }
      onlyIfMissing: true
      description: Claude bypass flags (mode-independent)
  install:
    # Seed ~/.claude/settings.json early (install runs synchronously before the
    # agent launches), branching on the auth mode surfaced via the
    # SBX_CRED_ANTHROPIC_MODE container env var (this kit declares the
    # "anthropic" credential service, same as the claude kit).
    # apiKeyHelper="echo proxy-managed" is included only when a credential
    # resolved (mode != none); without it Claude Code prompts for /login.
    # Idempotent via test -f so re-runs are a no-op and never clobber a
    # user-edited file. root-write + chown because contrib base-image ownership
    # of /home/agent/.claude is not guaranteed agent-owned. settings.json
    # content SYNCed with the claude kit.
    - command: |
        set -e
        mkdir -p /home/agent/.claude
        if [ ! -f /home/agent/.claude/settings.json ]; then
          HELPER=''
          if [ "${SBX_CRED_ANTHROPIC_MODE:-none}" != none ]; then
            HELPER='  "apiKeyHelper": "echo proxy-managed",
        '
          fi
          printf '%s' "{
          \"themeId\": 1,
          \"alwaysThinkingEnabled\": true,
        ${HELPER}  \"defaultMode\": \"bypassPermissions\",
          \"bypassPermissionsModeAccepted\": true
        }
        " > /home/agent/.claude/settings.json
        fi
        chown -R agent:agent /home/agent/.claude
      user: "root"
      description: Seed Claude settings.json from SBX_CRED_ANTHROPIC_MODE
    # Upstream nanoclaw is a pnpm project (packageManager: pnpm@10.33.0, ships
    # pnpm-lock.yaml, no package-lock.json). Activate pnpm via corepack (root,
    # writes shims to /usr/local/bin) so it is on PATH for the agent user.
    - command: "corepack enable && corepack prepare pnpm@10.33.0 --activate"
      user: "0"
      description: Activate pnpm 10 via corepack (upstream is a pnpm project)
    # pnpm honors ~/.npmrc, so the proxy set here applies to both npm and pnpm.
    - command: "npm config set proxy $HTTP_PROXY && npm config set https-proxy $HTTP_PROXY"
      user: "1000"
      description: Configure the package-manager proxy (read by both npm and pnpm)
    # Entrypoint: wait for the background install, but DO NOT hang forever. If
    # the install writes its failure marker, surface the tail of the build log
    # and drop into Claude Code anyway so the user can debug (cd ~/nanoclaw)
    # instead of staring at "Waiting..." indefinitely.
    - command: |
        cat > /usr/local/bin/nanoclaw-start <<'START'
        #!/bin/sh
        LOG=/home/agent/nanoclaw-install.log
        FAIL=/home/agent/nanoclaw-install.failed
        ready() { [ -f /home/agent/nanoclaw/.installed ] && [ -f /home/agent/.claude/settings.json ]; }
        if ! ready; then
          echo "Waiting for nanoclaw installation to complete..." >&2
          while ! ready; do
            if [ -f "$FAIL" ]; then
              echo "nanoclaw installation FAILED. Last 40 lines of $LOG:" >&2
              [ -f "$LOG" ] && tail -n 40 "$LOG" >&2
              echo "Starting Claude Code so you can debug (cd ~/nanoclaw && pnpm install)." >&2
              break
            fi
            sleep 2
          done
        fi
        exec claude --dangerously-skip-permissions
        START
        chmod +x /usr/local/bin/nanoclaw-start
      user: "0"
      description: Create agent entrypoint; waits for install but surfaces failures instead of hanging
    # Clone + build with pnpm (the upstream lockfile is pnpm-lock.yaml). On ANY
    # failed step, write nanoclaw-install.failed so the entrypoint stops waiting
    # and shows the log. --frozen-lockfile keeps the install reproducible.
    - command: |
        cat > /home/agent/nanoclaw-install.sh <<'INSTALL'
        #!/bin/sh
        rm -f /home/agent/nanoclaw-install.failed
        {
          git clone --depth 1 https://github.com/nanocoai/nanoclaw.git /home/agent/nanoclaw &&
          cd /home/agent/nanoclaw &&
          pnpm install --frozen-lockfile &&
          pnpm rebuild better-sqlite3 &&
          pnpm run build &&
          touch /home/agent/nanoclaw/.installed
        } || touch /home/agent/nanoclaw-install.failed
        INSTALL
        chmod +x /home/agent/nanoclaw-install.sh
        setsid /home/agent/nanoclaw-install.sh > /home/agent/nanoclaw-install.log 2>&1 &
      user: "1000"
      description: Clone and pnpm-build nanoclaw in background (~2 min; .installed on success, .failed on error)
    # Two entry points: `nanoclaw` launches the built daemon (dist/index.js,
    # the package "main"/start script); `ncl` is upstream's own CLI client
    # (bin/ncl -> pnpm exec tsx src/cli/client.ts). The symlink is created now
    # and resolves once the background clone finishes.
    - command: |
        cat > /usr/local/bin/nanoclaw <<'SCRIPT'
        #!/bin/sh
        cd /home/agent/nanoclaw
        exec node dist/index.js "$@"
        SCRIPT
        chmod +x /usr/local/bin/nanoclaw
        ln -sf /home/agent/nanoclaw/bin/ncl /usr/local/bin/ncl
      user: "0"
      description: Create nanoclaw daemon launcher and ncl CLI symlink (root-owned paths)

oauth:
  service: anthropic
  tokenEndpoint:
    host: platform.claude.com
    path: /v1/oauth/token
  sentinels:
    accessToken: sk-ant-oat01-proxy-managed
    refreshToken: sk-ant-ort01-proxy-managed
  credentialFile:
    path: "~/.claude/.credentials.json"
    template: '{"claudeAiOauth":{"accessToken":"{{.AccessToken}}","refreshToken":"{{.RefreshToken}}","expiresAt":{{.ExpiresAt}},"scopes":{{.ScopesJSON}}}}'
  skipIfEnv:
    - ANTHROPIC_API_KEY
